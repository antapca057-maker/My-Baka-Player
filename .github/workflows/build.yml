name: Build Baka-MPlayer
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Build project
        shell: pwsh
        run: |
          # Переходим в папку src, где лежит наш проект
          cd src
          qmake Baka-MPlayer.pro
          mingw32-make

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Baka-MPlayer-Exe
          path: "**/release/*.exe"
