name: Build Baka-MPlayer
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Download MPV Dev
        shell: pwsh
        run: |
          $url = "https://github.com/mpv-player/mpv-build/archive/refs/heads/master.zip"
          Invoke-WebRequest -Uri $url -OutFile "mpv.zip"
          Expand-Archive "mpv.zip" -DestinationPath "mpv_tmp"
          # Создаем папку include, чтобы qmake её видел
          New-Item -ItemType Directory -Path "include/mpv" -Force
          Copy-Item "mpv_tmp/*/libmpv/client.h" "include/mpv/"
          Copy-Item "mpv_tmp/*/libmpv/qthelper.hpp" "include/mpv/"

      - name: Build project
        shell: pwsh
        run: |
          # Теперь всё в одной папке, qmake сразу увидит файл
          qmake Baka-MPlayer.pro INCLUDEPATH+=include "CONFIG+=no_pkg_config"
          mingw32-make
          
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Baka-MPlayer-Exe
          path: "**/release/*.exe"
