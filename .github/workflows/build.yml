name: Build Baka-MPlayer
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Build project
        shell: pwsh
        run: |
          $pro = Get-ChildItem -Filter "Baka-MPlayer.pro" -Recurse | Select-Object -First 1
          if (!$pro) { throw "Файл .pro не найден в репозитории!" }
          cd $pro.Directory.FullName
          qmake Baka-MPlayer.pro
          mingw32-make

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Baka-MPlayer-Exe
          path: "**/release/*.exe"
          name: Baka-MPlayer-Exe
          path: release/*.exe
