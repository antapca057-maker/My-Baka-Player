name: Build Baka-MPlayer
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Setup MPV Headers
        shell: pwsh
        run: |
          # Скачиваем заголовки mpv прямо в папку src
          Invoke-WebRequest -Uri "https://github.com/mpv-player/mpv-build/archive/refs/heads/master.zip" -OutFile "mpv.zip"
          Expand-Archive "mpv.zip" -DestinationPath "mpv_tmp"
          New-Item -ItemType Directory -Path "src/include/mpv" -Force
          $header = Get-ChildItem -Path "mpv_tmp" -Filter "client.h" -Recurse | Select-Object -First 1
          Copy-Item $header.FullName "src/include/mpv/"
          Write-Host "MPV Headers Ready in src/include/mpv"

      - name: Build project
        shell: pwsh
        run: |
          cd src
          # Запускаем сборку из папки src, где теперь лежит .pro файл
          qmake Baka-MPlayer.pro INCLUDEPATH+=include "CONFIG+=no_pkg_config"
          mingw32-make -j2

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Baka-MPlayer-Exe
          path: "src/release/*.exe"
