name: Build Baka-MPlayer
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Create MPV Fake Headers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "src/include/mpv" -Force
          # Создаем минимальный рабочий client.h, чтобы компилятор не ругался
          $client_h = '
          #ifndef MPV_CLIENT_H_
          #define MPV_CLIENT_H_
          #include <stddef.h>
          #include <stdint.h>
          extern "C" {
              typedef struct mpv_handle mpv_handle;
              typedef enum { MPV_FORMAT_NONE = 0 } mpv_format;
              mpv_handle *mpv_create(void);
              int mpv_initialize(mpv_handle *ctx);
              void mpv_terminate_destroy(mpv_handle *ctx);
              int mpv_set_option_string(mpv_handle *ctx, const char *name, const char *data);
          }
          #endif'
          $client_h | Out-File -FilePath "src/include/mpv/client.h" -Encoding UTF8
          
          # Создаем пустой qthelper.hpp
          "#ifndef MPV_QTHELPER_HPP_`n#define MPV_QTHELPER_HPP_`n#endif" | Out-File -FilePath "src/include/mpv/qthelper.hpp" -Encoding UTF8
          Write-Host "Headers created locally!"

      - name: Build project
        shell: pwsh
        run: |
          if (Test-Path "src/Baka-MPlayer.pro") { cd src }
          qmake Baka-MPlayer.pro INCLUDEPATH+=include "CONFIG+=no_pkg_config"
          mingw32-make -j2

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "Dist" -Force
          Get-ChildItem -Path "**/release/*.exe" -Recurse | Copy-Item -Destination "Dist/"
          
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Baka-MPlayer-Build
          path: Dist/
