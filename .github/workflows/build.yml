name: Build Baka-MPlayer
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Create MPV Stub
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "src/include/mpv" -Force
          # Создаем файл-заглушку, чтобы компилятор не ругался
          $h = '#ifndef MPV_CLIENT_H_`n#define MPV_CLIENT_H_`ntypedef struct mpv_handle mpv_handle;`n#endif'
          $h | Out-File -FilePath "src/include/mpv/client.h" -Encoding UTF8
          "" | Out-File -FilePath "src/include/mpv/qthelper.hpp" -Encoding UTF8

      - name: Build project
        shell: pwsh
        run: |
          if (Test-Path "src/Baka-MPlayer.pro") { cd src }
          # ВНИМАНИЕ: Мы подменяем параметры прямо в командной строке
          qmake Baka-MPlayer.pro `
            "CONFIG+=no_pkg_config" `
            "INCLUDEPATH+=include" `
            "LIBS+=-L." `
            "DEFINES+=NODEV"
          
          mingw32-make -j2

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "Dist" -Force
          Get-ChildItem -Path "**/release/*.exe" -Recurse | Copy-Item -Destination "Dist/"
          
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Baka-MPlayer-Build
          path: Dist/
